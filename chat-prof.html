<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat avec le professeur — test backend</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1A2232;color:#fff;min-height:100vh;
  font-family:'Fraunces',serif;
  display:flex;flex-direction:column;max-width:560px;margin:0 auto;
}
header{
  padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;background:#1A2232;z-index:5;
}
.who{display:flex;align-items:center;gap:11px;}
.av{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(251,191,36,.6);background:rgba(251,191,36,.10);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.who h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.who .sub{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(251,191,36,.6);}
.newchat{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.5);background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:8px 13px;cursor:pointer;
}
#thread{flex:1;overflow-y:auto;padding:20px 16px 12px;display:flex;flex-direction:column;gap:14px;}
.msg{display:flex;gap:9px;max-width:90%;}
.msg.me{align-self:flex-end;}
.msg.prof .mav{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;align-self:flex-end;
  border:1.5px solid rgba(251,191,36,.5);background:rgba(251,191,36,.08);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.bubble{padding:12px 15px;border-radius:17px;font-size:15px;line-height:1.5;}
.msg.me .bubble{
  background:rgba(251,191,36,.13);border:1px solid rgba(251,191,36,.30);
  border-bottom-right-radius:5px;color:rgba(255,232,170,.96);
}
.msg.prof .bubble{
  background:rgba(13,19,32,.92);border:1px solid rgba(251,191,36,.18);
  border-bottom-left-radius:5px;color:rgba(255,255,255,.9);
}
.bubble p{margin:0 0 9px;}
.bubble p:last-child{margin-bottom:0;}
/* mot anglais surligné */
.hl{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;color:#FCD34D;letter-spacing:.01em;}
.key{color:#FCD34D;}
/* tableau grille */
.grid{width:100%;border-collapse:collapse;margin:11px 0;font-family:'Fraunces',serif;font-size:14px;}
.grid caption{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(251,191,36,.7);text-align:left;margin-bottom:7px;}
.grid th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:400;text-align:left;padding:7px 11px;border-bottom:1px solid rgba(251,191,36,.3);}
.grid td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.82);}
.grid td .hl{font-size:17px;}
.grid tr:last-child td{border-bottom:none;}
/* mini-tableau */
.tab{margin:10px 0 4px;display:flex;flex-direction:column;gap:7px;}
.row{
  display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;
  background:rgba(255,255,255,.04);border-left:3px solid var(--c,rgba(251,191,36,.6));
}
.row .rfr{font-family:'Fraunces',serif;font-size:13px;color:rgba(255,255,255,.6);flex:1;}
.row .ren{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:22px;color:#FCD34D;}
.cat-prono{--c:rgba(52,211,153,.8);}
.cat-traduction{--c:rgba(56,189,248,.8);}
.cat-construction{--c:rgba(96,165,250,.8);}
.cat-contraction{--c:rgba(251,113,133,.8);}
.cat-expression{--c:rgba(167,139,250,.8);}
/* "Le professeur réfléchit" */
.typing{display:flex;gap:5px;padding:6px 2px;}
.typing i{width:7px;height:7px;border-radius:50%;background:rgba(251,191,36,.55);animation:tk 1.2s ease-in-out infinite;}
.typing i:nth-child(2){animation-delay:.18s}
.typing i:nth-child(3){animation-delay:.36s}
@keyframes tk{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}
.err{color:#fca5a5;font-family:'JetBrains Mono',monospace;font-size:12px;}
/* barre de saisie */
.compose{
  position:sticky;bottom:0;background:#1A2232;
  padding:12px 14px 22px;border-top:1px solid rgba(255,255,255,.08);
  display:flex;gap:9px;align-items:flex-end;
}
#input{
  flex:1;resize:none;max-height:120px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);
  border-radius:22px;padding:13px 17px;color:#fff;
  font-family:'Fraunces',serif;font-size:15px;line-height:1.4;
}
#input:focus{outline:none;border-color:rgba(251,191,36,.5);}
#send{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;border:none;cursor:pointer;
  background:rgba(251,191,36,.92);display:flex;align-items:center;justify-content:center;
}
#send:disabled{opacity:.4;cursor:default;}
</style>
</head>
<body>

<header>
  <div class="who">
    <div class="av">🎓</div>
    <div>
      <h1>Professeur</h1>
      <div class="sub">prof d'anglais · test</div>
    </div>
  </div>
  <button class="newchat" onclick="newChat()">＋ Nouveau chat</button>
</header>

<div id="thread"></div>

<div class="compose">
  <textarea id="input" rows="1" placeholder="Pose ta question au professeur…"></textarea>
  <button id="send" onclick="send()" title="Envoyer">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,.8)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
  </button>
</div>

<script>
// Point d'accès du backend. En local avec `netlify dev`, ou en prod, ce chemin marche.
const API = "/.netlify/functions/question";

let messages = [];          // toute la conversation du chat en cours
const thread = document.getElementById("input");
const $thread = document.getElementById("thread");
const $input = document.getElementById("input");
const $send = document.getElementById("send");

// Auto-grandir le champ de saisie
$input.addEventListener("input", () => {
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 120) + "px";
});
// Entrée = envoyer ; Maj+Entrée = nouvelle ligne
$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function newChat() {
  messages = [];
  $thread.innerHTML = "";
  $input.focus();
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
// {{MOT}} → mot anglais ambre ; **phrase** → phrase-clé surlignée
function renderTexte(t){
  return escapeHtml(t)
    .replace(/\*\*(.+?)\*\*/g, '<span class="key">$1</span>')
    .replace(/\{\{(.+?)\}\}/g, '<span class="hl">$1</span>');
}

function addMe(texte){
  const el = document.createElement("div");
  el.className = "msg me";
  el.innerHTML = '<div class="bubble">'+escapeHtml(texte)+'</div>';
  $thread.appendChild(el);
  scroll();
}

function addTyping(){
  const el = document.createElement("div");
  el.className = "msg prof"; el.id = "typing";
  el.innerHTML = '<div class="mav">🎓</div><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>';
  $thread.appendChild(el);
  scroll();
}
function removeTyping(){ const t = document.getElementById("typing"); if(t) t.remove(); }

// Rend une réponse structurée { reponse: [ {type:texte|tableau} ] }
function addProf(data){
  const el = document.createElement("div");
  el.className = "msg prof";
  let inner = '<div class="mav">🎓</div><div class="bubble">';
  let plainForHistory = [];
  (data.reponse || []).forEach(bloc => {
    if (bloc.type === "texte" && bloc.contenu){
      inner += "<p>"+renderTexte(bloc.contenu)+"</p>";
      plainForHistory.push(bloc.contenu);
    } else if (bloc.type === "tableau" && Array.isArray(bloc.lignes)){
      if (bloc.format === "grille"){
        // Vrai tableau à colonnes
        inner += '<table class="grid">';
        if (bloc.titre) inner += '<caption>'+escapeHtml(bloc.titre)+'</caption>';
        if (Array.isArray(bloc.entetes) && bloc.entetes.length){
          inner += '<thead><tr>'+bloc.entetes.map(h => '<th>'+escapeHtml(h)+'</th>').join('')+'</tr></thead>';
        }
        inner += '<tbody>';
        bloc.lignes.forEach(l => {
          const cells = Array.isArray(l.cellules) ? l.cellules : [l.fr||"", l.en||""];
          inner += '<tr>'+cells.map(c => '<td>'+renderTexte(c)+'</td>').join('')+'</tr>';
        });
        inner += '</tbody></table>';
        plainForHistory.push(bloc.lignes.map(l => (l.cellules||[l.fr,l.en]).join(" → ")).join(" ; "));
      } else {
        // Cartes « paires » FR → EN
        inner += '<div class="tab">';
        bloc.lignes.forEach(l => {
          inner += '<div class="row cat-'+(l.cat||"prono")+'"><span class="rfr">'+escapeHtml(l.fr||"")+'</span><span class="ren">'+escapeHtml(l.en||"")+'</span></div>';
        });
        inner += "</div>";
        plainForHistory.push(bloc.lignes.map(l => l.fr+" = "+l.en).join(", "));
      }
    }
  });
  inner += "</div>";
  el.innerHTML = inner;
  $thread.appendChild(el);
  scroll();
  // Mémoriser la réponse du prof dans la conversation
  messages.push({ role: "prof", texte: plainForHistory.join("\n") });
}

function addError(msg){
  const el = document.createElement("div");
  el.className = "msg prof";
  el.innerHTML = '<div class="mav">⚠️</div><div class="bubble"><span class="err">'+escapeHtml(msg)+'</span></div>';
  $thread.appendChild(el);
  scroll();
}

function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

async function send(){
  const texte = $input.value.trim();
  if (!texte) return;
  $input.value = ""; $input.style.height = "auto";
  $send.disabled = true;

  addMe(texte);
  messages.push({ role: "eleve", texte });
  addTyping();

  try {
    const r = await fetch(API, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ messages })
    });
    removeTyping();
    const data = await r.json();
    if (!r.ok) {
      addError(data.error || "Erreur serveur.");
    } else {
      addProf(data);
    }
  } catch (e) {
    removeTyping();
    addError("Connexion impossible : " + e.message);
  } finally {
    $send.disabled = false;
    $input.focus();
  }
}

$input.focus();
</script>
</body>
</html>
